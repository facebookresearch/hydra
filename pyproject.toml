[tool.towncrier]
    package = "hydra"
    package_dir = ""
    filename = "NEWS.md"
    directory = "news/"
    title_format = "{version} ({project_date})"
    template = "news/_template.rst"
    issue_format = "[#{issue}](https://github.com/facebookresearch/hydra/issues/{issue})"
    start_string = "<!-- TOWNCRIER -->\n"

  [[tool.towncrier.type]]
  directory = "feature"
  name = "Features"
  showcontent = true

  [[tool.towncrier.type]]
  directory = "api_change"
  name = "API Change (Renames, deprecations and removals)"
  showcontent = true

  [[tool.towncrier.type]]
  directory = "bugfix"
  name = "Bug Fixes"
  showcontent = true

  [[tool.towncrier.type]]
  directory = "plugin"
  name = "Plugins"
  showcontent = true

  [[tool.towncrier.type]]
  directory = "config"
  name = "Configuration structure changes"
  showcontent = true

  [[tool.towncrier.type]]
  directory = "docs"
  name = "Improved Documentation"
  showcontent = true

  [[tool.towncrier.type]]
  directory = "maintenance"
  name = "Maintenance Changes"
  showcontent = true

[tool.black]
line-length = 88
target-version = ['py310']
include = '\.pyi?$'
exclude = '''
(
  /(
      .eggs         # exclude a few common directories in the
    | .git          # root of the project
    | .hg
    | .sl
    | hydra/grammar/gen
    | tools/configen/example/gen
    | .tox
    | .nox
    | website
    | .venv
    | temp
    | _build
    | dist
    | build
    | contrib
  )
)
'''

[tool.pyrefly]
project-includes = [
    "*.py",
    "build_helpers/**/*.py",
    "hydra/**/*.py",
    "tests/**/*.py",
]
project-excludes = [
    "hydra/grammar/gen/**",
    "tests/standalone_apps/**",
    "tests/test_apps/**",
]
search-path = [
    ".stubs",
]
ignore-missing-imports = [
    "antlr4",
    "antlr4.*",
    "nevergrad",
    "nevergrad.*",
    "rq",
    "rq.*",
]
replace-imports-with-any = [
    "hydra.grammar.gen.*",
]
enabled-ignores = [
    "type",
    "pyrefly",
]
